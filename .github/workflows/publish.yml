name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event.release.target_commitish == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup yarnrc
        uses: ./.github/actions/setup-yarnrc
        with:
          npmAuthToken: ${{ github.token }}

      - name: Validate release tag matches package version
        working-directory: frontend
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v$PACKAGE_VERSION"
          RELEASE_TAG="${{ github.event.release.tag_name }}"

          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag ($RELEASE_TAG) matcher ikke package.json-versjon ($PACKAGE_VERSION)."
            echo "Disse må være like for at publisering skal fortsette."
            exit 1
          fi

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        working-directory: frontend
        run: yarn build

      - name: Publish to Github Packages
        working-directory: frontend
        run: yarn npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
